<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos - Tratordom</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='imagens/favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="static/style.css">    <!-- CSS global -->
    <link rel="stylesheet" href="static/stylecss/contatos.css">    <!-- CSS da página de contatos -->
    <link rel="stylesheet" href="static/stylecss/header.css">  <!-- CSS do header -->
</head>
<body>
    <header>
        <img src="static/imagens/Touro.png" alt=" Logo da Tratordom" class="logo">
        <h1>Tratordom</h1>
        <nav>
            <a href="/index">Home</a>
            <a href="/produtos">Produtos</a>
            <a href="/assinatura" style="color: #ffd54f;">Assinatura VIP</a>
            <a href="/carrinho" id="ver-carrinho">Carrinho (<span id="contador">0</span>)</a>
        </nav>
    </header>

    <!-- Informações de contato -->
    <section id="informacoes">
        <h2>Informações de Contato</h2>
        <p><strong>Email:</strong> <a href="mailto:tratordom@gmail.com">tratordom@gmail.com</a></p>
        <p><strong>Telefone:</strong> (11) 99999-9999</p>
        <p><strong>WhatsApp:</strong> <a href="https://wa.me/5511999999999" target="_blank">Clique para enviar mensagem</a></p>
        <p><strong>Endereço:</strong> Rua da Agricultura, 123, Cidade, Estado</p>
    </section>

    <!-- Formulário de contato -->
    <section id="formulario">
        <h2>Envie sua mensagem</h2>
        <form action="https://formspree.io/f/xvzrqqpr" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" autocomplete="off" value="" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" autocomplete="off" value="" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" autocomplete="off" value="" required></textarea>

            <button type="submit">Enviar</button>
        </form>
    </section>

    <!-- Mapa de localização -->
<section id="mapa">
    <h2>Localização</h2>
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.123456!2d-46.633308!3d-23.550520!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59b0f6b1c69f%3A0x8e3f6b3e12345678!2sSão%20Paulo%2C%20SP!5e0!3m2!1spt-BR!2sbr!4v1700000000000!5m2!1spt-BR!2sbr"
        width="100%"
        height="300"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">

</section>

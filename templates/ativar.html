<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativar VIP - Tratordom</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='imagens/favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="static/stylecss/header.css">
    <link rel="stylesheet" href="static/stylecss/assinatura.css">
    <link rel="stylesheet" href="static/stylecss/login.css">
</head>
<body>
    <header>
        <img src="static/imagens/Touro.png" alt="Logo da Tratordom" class="logo">
        <h1>Tratordom</h1>
        <nav>
            <a href="/index">Home</a>
            <a href="/assinatura">Planos</a>
            <span id="usuario-container"></span>
        </nav>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
        <section id="area-ativacao">
            <h2>Ativação de Assinatura</h2>
            <p>Insira abaixo o código que você recebeu via WhatsApp após o pagamento.</p>
            
            <input type="text" id="codigo-vip" placeholder="DIGITE SEU CÓDIGO AQUI">
            <button onclick="verificarCodigo()">Validar Acesso VIP</button>
            
            <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">
                Ainda não tem um código? <a href="/assinatura" style="color: var(--accent-blue);">Clique aqui para assinar.</a>
            </p>
        </section>
    </main>

    <script src="static/script.js"></script>
    <script src="static/google-login.js"></script>
</body>
</html>

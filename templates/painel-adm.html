<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Tratordom</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .painel { background: #1e1e1e; padding: 40px; border-radius: 15px; border: 2px solid #2196f3; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #2196f3; margin-bottom: 10px; }
        #resultado { background: #000; padding: 20px; font-family: monospace; font-size: 1.8rem; color: #4caf50; border-radius: 8px; margin: 20px 0; border: 1px solid #333; letter-spacing: 2px; }
        button { background: #2196f3; color: white; border: none; padding: 15px 30px; font-size: 1rem; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1976d2; transform: scale(1.05); }
        .instrucao { color: #888; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="painel">
        <h1>Gerador VIP Tratordom</h1>
        <p>Use esta ferramenta para criar códigos após confirmar o PIX.</p>
        
        <div id="resultado">TD-XXXXXXXX-VIP</div>
        
        <button onclick="gerarCodigo()">GERAR NOVO CÓDIGO</button>
        
        <p class="instrucao">O código acima é validado pelo algoritmo de verificação do site.</p>
    </div>

    <script>
    // BLOQUEIO DE ACESSO
    (function() {
        const senhaCorreta = "SENHA123"; 
        const tentativa = prompt("ACESSO RESTRITO\nDigite a senha:");

        if (tentativa !== senhaCorreta) {
            window.location.href = "/index"; 
        } else {
            setTimeout(() => {
                mostrarNotificacao("Acesso Administrativo Autorizado!");
            }, 500);
        }
    })();

    function mostrarNotificacao(mensagem, cor = "#2196f3") {
        const toast = document.createElement("div");
        toast.innerText = mensagem;

        Object.assign(toast.style, {
            position: "fixed", bottom: "30px", right: "30px", backgroundColor: cor,
            color: "white", padding: "16px 28px", borderRadius: "10px",
            boxShadow: "0 8px 20px rgba(0,0,0,0.4)", zIndex: "10000",
            fontFamily: "sans-serif", fontWeight: "bold", transition: "all 0.5s ease",
            opacity: "0", transform: "translateY(20px)"
        });

        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = "1"; toast.style.transform = "translateY(0)"; }, 100);
        setTimeout(() => {
            toast.style.opacity = "0"; toast.style.transform = "translateY(20px)";
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function gerarCodigo() {
        let n = "";
        for (let i = 0; i < 7; i++) { n += Math.floor(Math.random() * 10); }

        let soma = 0;
        let mult = 2;
        for (let i = 6; i >= 0; i--) { soma += parseInt(n[i]) * mult; mult++; }
        
        let resto = soma % 11;
        let dv = (resto < 2) ? 0 : 11 - resto;
        if (dv === 10) dv = 1;

        const codigoFinal = `TD-${n}${dv}-VIP`;

        // Apenas exibe e copia
        document.getElementById('resultado').innerText = codigoFinal;
        navigator.clipboard.writeText(codigoFinal);;
    }
    </script>
</body>
</html>

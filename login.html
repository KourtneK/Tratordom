<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tratordom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylecss/login.css">
</head>
<body>
    <header>
        <h1>Tratordom</h1>
    </header>

    <section id="login-container">
        <h2>Login com Google</h2>
        <p>Faça login para acessar sua conta e seu carrinho.</p>

        <!-- Botão do Google -->
        <div id="g_id_onload"

             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </section>

    <footer>
        <p>&copy; 2026 Tratordom - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="google-login.js"></script>
    <script src="logout.js"></script>
</body>
</html>

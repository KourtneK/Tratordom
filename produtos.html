<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Produtos - Tratordom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tratordom</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="contatos.html">Contatos</a>
            <a href="carrinho.html" id="ver-carrinho">Carrinho (<span id="contador">0</span>)</a>
        </nav>
    </header>

    <section id="lista-produtos">
        <h2>Produtos em Destaque</h2>
        <div class="grid-produtos">
            <div class="produto">
                <img src="milho.webp" alt="Sementes de milho">
                <h3>Sementes de Milho</h3>
                <p>R$ 20,00</p>
                <button class="adicionar" data-produto="Sementes de Milho" data-preco="20">Adicionar ao carrinho</button>
            </div>
            <div class="produto">
                <img src="feartilizante.webp" alt="Fertilizante">
                <h3>Fertilizante Orgânico</h3>
                <p>R$ 35,00</p>
                <button class="adicionar" data-produto="Fertilizante Orgânico" data-preco="35">Adicionar ao carrinho</button>
            </div>
            <div class="produto">
                <img src="enxada.png" alt="Ferramenta agrícola">
                <h3>Enxada Profissional</h3>
                <p>R$ 50,00</p>
                <button class="adicionar" data-produto="Enxada Profissional" data-preco="50">Adicionar ao carrinho</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Tratordom - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
